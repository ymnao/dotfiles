# 配置先: .github/dependabot.yml
# CI (make test) がゲートになったので、依存更新 PR を安全に受けられる。
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # 他 PR merge 時の自動 rebase (= CI 再走行) を止める。conflict 時は
    # `@dependabot rebase` で手動発行する
    rebase-strategy: disabled
    groups:
      all:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    rebase-strategy: disabled
    groups:
      all:
        patterns:
          - "*"
