# dotfiles の検証 CI。配置先: .github/workflows/test.yml
#
# トリガーは push (全ブランチ)。PR イベントを重ねると同一コミットに 2 回走るため
# 使わない。verify-ci-before-pr hook は「HEAD コミットの CI 状態」を見るので、
# PR 作成前の push で走るこの形が必須。
name: test

on:
  push:

# 同一ブランチへの連続 push で古い run を打ち切り、Actions 分数を節約する。
# main は cancel-in-progress: false にして完走させる (verify-ci-before-pr hook が
# main の CI 結果を参照するため、途中打ち切りで状態が曖昧になるのを避ける)。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ロケール軸再発防止 (issue #181): make test を LC_ALL=C / en_US.UTF-8 /
  # ja_JP.UTF-8 の 3 ロケールで並列に回す。BSD/GNU awk の strcoll() 依存や
  # UTF-8 ロケール依存のバグ (past incident: agents-md-sync の日本語文字列
  # 誤 equal) を CI で常時検出するため。
  #
  # ロケール選定の根拠:
  #   - C: strcoll がバイト同一比較になる基準ケース、UTF-8 系との対比軸
  #   - en_US.UTF-8: past incident (A) が実際に発火したロケール、多くの
  #     macOS/Linux デフォルト
  #   - ja_JP.UTF-8: 日本語運用環境 (repo の主対象) の実挙動を再現。en_US
  #     とは照合順序が異なる (漢字の順序等) ため、UTF-8 系で別クラスの
  #     collation 差を拾える保険
  #
  # bash 版数軸 (macOS runner / bash 3.2) は Linux runner の ~10 倍分数を
  # 消費するため本 job には含めず、別 issue で単独評価する (issue #181 参照)。
  # bash 3.2 固有のクラス (past incident B) は CI では原理的に検出できない。
  # 開発者が macOS 手元で `make test` / `make test-locale-matrix` を実行した
  # 時に限り検出される (常時強制されていない点に注意)。
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        locale: [C, en_US.UTF-8, ja_JP.UTF-8]
    env:
      LC_ALL: ${{ matrix.locale }}
      LANG: ${{ matrix.locale }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # ubuntu-latest は C / en_US.UTF-8 は含むが ja_JP.UTF-8 は無い。
      # locale-gen は既存ロケール指定でも数秒で no-op になるため無条件実行する。
      # 生成失敗 (runner イメージ変更等) は fail-fast したいので || true しない。
      - name: Ensure locale ${{ matrix.locale }} is available
        run: |
          sudo locale-gen "${{ matrix.locale }}"
          sudo update-locale

      # 開発機は Brewfile 経由 (Homebrew) で shellcheck/jq を入れるが、CI は
      # ubuntu-latest 上で Linuxbrew を起動するオーバーヘッド (数分) を避けるため
      # apt で入れる。install 経路が dev↔CI で分岐している点は意図。
      - name: Install shellcheck and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      # bash 版数とロケールを毎 job のログに残す (issue #181 の再発防止観点)。
      # 何かで CI が誤 pass したときの切り分けのため、環境情報は必ず記録する。
      - name: Show bash version and locale
        run: |
          bash --version
          locale

      - name: make test
        run: make test

  # lint は matrix で 3 回走らせる意味がないため単独 job に分離する
  # (locale 非依存の secretlint 実行)。
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm

      - name: make lint
        run: make lint
