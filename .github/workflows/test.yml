# dotfiles の検証 CI。配置先: .github/workflows/test.yml
#
# トリガーは push (全ブランチ)。PR イベントを重ねると同一コミットに 2 回走るため
# 使わない。verify-ci-before-pr hook は「HEAD コミットの CI 状態」を見るので、
# PR 作成前の push で走るこの形が必須。
name: test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # 開発機は Brewfile 経由 (Homebrew) で shellcheck/jq を入れるが、CI は
      # ubuntu-latest 上で Linuxbrew を起動するオーバーヘッド (数分) を避けるため
      # apt で入れる。install 経路が dev↔CI で分岐している点は意図。
      - name: Install shellcheck and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: make test
        run: make test

      - name: make lint
        run: make lint
